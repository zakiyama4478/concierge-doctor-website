<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本コンシェルジュドクター協会|理想の医療に近づくための新しい選択肢を</title>
<meta name="description" content="日本コンシェルジュドクター協会は、コンシェルジュ医療を実践・探求する医師のための認証機関・会員ネットワークです。創設期につき入会無料。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============ 基本設計 ============ */
  :root{
    --navy:#1B2A47;        /* 主色:深紺(権威・信頼) */
    --navy-deep:#12203A;
    --ivory:#F8F6F1;       /* 地色:生成り(誠実・清潔) */
    --gold:#A8854E;        /* 差し色:真鍮(上質・控えめな格) */
    --gold-light:#C9A86A;
    --ink:#2A2A28;         /* 本文 */
    --ink-soft:#5C5A54;
    --line:#DDD8CC;
    --serif:"Shippori Mincho","Hiragino Mincho ProN",serif;
    --sans:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;scroll-padding-top:72px}
  body{font-family:var(--sans);color:var(--ink);background:var(--ivory);line-height:1.9;font-size:16px;-webkit-font-smoothing:antialiased}
  img{max-width:100%}
  a{color:inherit}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}
  section{padding:96px 0}
  .sec-label{font-family:var(--sans);font-size:12px;letter-spacing:.3em;color:var(--gold);font-weight:700;text-transform:uppercase;display:block;margin-bottom:14px}
  h2{font-family:var(--serif);font-size:clamp(26px,4vw,36px);font-weight:600;line-height:1.5;letter-spacing:.04em;margin-bottom:28px}
  .lead{font-size:16.5px;color:var(--ink-soft);max-width:680px}
  /* 句読点でのみ改行(文節を分割しない) */
  .nb{display:inline-block}

  /* ============ CTAボタン ============ */
  .btn{display:inline-block;text-decoration:none;font-weight:700;letter-spacing:.08em;text-align:center;transition:opacity .25s,transform .25s}
  .btn:hover{opacity:.88;transform:translateY(-1px)}
  .btn-primary{background:var(--gold);color:#fff;padding:18px 48px;font-size:16px;border-radius:3px}
  .btn-ghost{border:1px solid rgba(255,255,255,.55);color:#fff;padding:17px 40px;font-size:14.5px;border-radius:3px}
  .btn-note{display:block;margin-top:12px;font-size:12.5px;letter-spacing:.1em;color:var(--ink-soft)}

  /* ============ ヘッダー ============ */
  header{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(248,246,241,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .header-in{max-width:1180px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:var(--serif);font-weight:700;font-size:16px;letter-spacing:.12em;color:var(--navy);text-decoration:none}
  .logo small{display:block;font-size:9px;letter-spacing:.28em;color:var(--gold);font-family:var(--sans)}
  nav ul{display:flex;gap:28px;list-style:none}
  nav a{text-decoration:none;font-size:13.5px;letter-spacing:.06em;color:var(--ink-soft)}
  nav a:hover{color:var(--navy)}
  .header-cta{background:var(--navy);color:#fff;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:.08em;padding:10px 22px;border-radius:3px}
  .header-cta:hover{background:var(--gold)}
  @media(max-width:860px){nav{display:none}}

  /* ============ 1. ファーストビュー ============ */
  .hero{background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 70%);color:#fff;padding:180px 0 120px;position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-120px;top:-120px;width:480px;height:480px;border:1px solid rgba(201,168,106,.25);border-radius:50%}
  .hero::before{content:"";position:absolute;right:-40px;top:40px;width:480px;height:480px;border:1px solid rgba(201,168,106,.12);border-radius:50%}
  .hero .wrap{position:relative;z-index:1}
  .hero-eyebrow{font-size:13px;letter-spacing:.3em;color:var(--gold-light);margin-bottom:26px;font-weight:500}
  .hero h1{font-family:var(--serif);font-size:clamp(30px,5.4vw,52px);font-weight:600;line-height:1.55;letter-spacing:.05em;margin-bottom:30px}
  .hero h1 em{font-style:normal;color:var(--gold-light)}
  .hero p{max-width:620px;font-size:16px;color:rgba(255,255,255,.82);margin-bottom:44px}
  .hero-cta-row{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
  .hero .btn-note{color:rgba(255,255,255,.62)}

  /* ============ 2. コンシェルジュ医療とは ============ */
  .about{background:#fff}
  .def-quote{font-family:var(--serif);font-size:clamp(19px,2.6vw,23px);line-height:2.1;border-left:3px solid var(--gold);padding:8px 0 8px 28px;margin:40px 0 48px;color:var(--navy)}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px}
  .card{background:var(--ivory);border:1px solid var(--line);padding:36px 30px;border-radius:4px}
  .card .num{font-family:var(--serif);font-size:13px;letter-spacing:.2em;color:var(--gold);display:block;margin-bottom:14px}
  .card h3{font-family:var(--serif);font-size:19px;color:var(--navy);margin-bottom:14px;line-height:1.6}
  .card p{font-size:14.5px;color:var(--ink-soft)}
  .about-note{margin-top:36px;font-size:13px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:20px}

  /* ============ 3. 課題提起 ============ */
  .problem{background:var(--navy);color:#fff}
  .problem .sec-label{color:var(--gold-light)}
  .problem .lead{color:rgba(255,255,255,.78)}
  .problem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.14);margin-top:48px}
  .problem-item{background:var(--navy);padding:38px 32px}
  .problem-item h3{font-family:var(--serif);font-size:18px;line-height:1.7;margin-bottom:14px;color:var(--gold-light)}
  .problem-item p{font-size:14.5px;color:rgba(255,255,255,.78)}
  .problem-close{margin-top:52px;font-family:var(--serif);font-size:clamp(19px,2.6vw,24px);line-height:2;text-align:center;letter-spacing:.05em}

  /* ============ 4. 提供価値 ============ */
  .value .pillar{display:grid;grid-template-columns:200px 1fr;gap:36px;padding:44px 0;border-bottom:1px solid var(--line);align-items:start}
  .value .pillar:first-of-type{border-top:1px solid var(--line);margin-top:24px}
  .pillar-head .kanji{font-family:var(--serif);font-size:30px;color:var(--navy);font-weight:600;line-height:1.4}
  .pillar-head .en{font-size:11px;letter-spacing:.26em;color:var(--gold);font-weight:700;margin-top:6px;display:block}
  .pillar-body h3{font-size:17px;font-weight:700;margin-bottom:12px;color:var(--navy)}
  .pillar-body p{font-size:15px;color:var(--ink-soft)}
  .pillar-body ul{margin-top:14px;list-style:none}
  .pillar-body li{font-size:14px;color:var(--ink-soft);padding-left:1.4em;position:relative;margin-bottom:6px}
  .pillar-body li::before{content:"―";position:absolute;left:0;color:var(--gold)}
  .founding{margin-top:56px;background:#fff;border:1px solid var(--gold-light);padding:40px 36px;border-radius:4px;text-align:center}
  .founding h3{font-family:var(--serif);font-size:21px;color:var(--navy);margin-bottom:14px}
  .founding p{font-size:15px;color:var(--ink-soft);max-width:640px;margin:0 auto}
  @media(max-width:680px){.value .pillar{grid-template-columns:1fr;gap:14px}}

  /* ============ 5. 仕組み・流れ ============ */
  .flow{background:#fff}
  .steps{counter-reset:step;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:24px;margin-top:48px}
  .step{counter-increment:step;background:var(--ivory);border:1px solid var(--line);padding:34px 26px;border-radius:4px;position:relative}
  .step::before{content:"0" counter(step);font-family:var(--serif);font-size:34px;color:var(--gold);display:block;margin-bottom:16px;line-height:1}
  .step h3{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:10px}
  .step p{font-size:13.5px;color:var(--ink-soft)}
  .flow-note{margin-top:32px;font-size:13px;color:var(--ink-soft);text-align:center}

  /* ============ 6. 信頼性 ============ */
  .trust-block{margin-top:48px}
  .trust-block h3{font-family:var(--serif);font-size:21px;color:var(--navy);margin-bottom:22px;padding-bottom:12px;border-bottom:2px solid var(--gold)}
  .principles{list-style:none}
  .principles li{display:grid;grid-template-columns:64px 1fr;gap:20px;padding:26px 0;border-bottom:1px solid var(--line);align-items:baseline}
  .principles .no{font-family:var(--serif);font-size:24px;color:var(--gold)}
  .principles strong{display:block;font-size:16.5px;color:var(--navy);margin-bottom:6px}
  .principles p{font-size:14.5px;color:var(--ink-soft)}
  .gov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px}
  .gov-item{background:#fff;border:1px solid var(--line);padding:30px 28px;border-radius:4px}
  .gov-item h4{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:10px}
  .gov-item p{font-size:13.5px;color:var(--ink-soft)}

  /* ============ 7. FAQ ============ */
  .faq{background:#fff}
  .faq details{border-bottom:1px solid var(--line)}
  .faq details:first-of-type{border-top:1px solid var(--line);margin-top:24px}
  .faq summary{cursor:pointer;list-style:none;padding:26px 44px 26px 8px;font-weight:700;font-size:15.5px;color:var(--navy);position:relative;letter-spacing:.03em}
  .faq summary::-webkit-details-marker{display:none}
  .faq summary::before{content:"Q.";font-family:var(--serif);color:var(--gold);margin-right:14px}
  .faq summary::after{content:"+";position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--gold);font-weight:400;transition:transform .25s}
  .faq details[open] summary::after{transform:translateY(-50%) rotate(45deg)}
  .faq .ans{padding:0 8px 30px;font-size:14.5px;color:var(--ink-soft);max-width:760px}
  .faq .ans::before{content:"A.";font-family:var(--serif);color:var(--navy);margin-right:14px;font-weight:600}

  /* ============ 8. 最終CTA ============ */
  .final{background:linear-gradient(160deg,var(--navy) 0%,var(--navy-deep) 70%);color:#fff;text-align:center;padding:110px 0}
  .final h2{margin-bottom:20px}
  .final p{max-width:600px;margin:0 auto 44px;color:rgba(255,255,255,.8);font-size:15.5px}
  .final .btn-note{color:rgba(255,255,255,.62)}

  /* ============ 9. フッター ============ */
  footer{background:var(--navy-deep);color:rgba(255,255,255,.65);padding:56px 0 40px;font-size:13px}
  .foot-logo{font-family:var(--serif);color:#fff;font-size:16px;letter-spacing:.12em;margin-bottom:18px}
  .disclaimer{border-top:1px solid rgba(255,255,255,.15);margin-top:28px;padding-top:24px;font-size:12px;line-height:2;color:rgba(255,255,255,.5)}
  .copyright{margin-top:24px;font-size:11px;letter-spacing:.08em;color:rgba(255,255,255,.4)}

  /* ============ 出現アニメーション ============ */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
  .reveal.on{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none;transition:none}html{scroll-behavior:auto}}

  @media(max-width:680px){
    section{padding:72px 0}
    .hero{padding:140px 0 88px}
    .btn-primary{display:block;width:100%}
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/App.jsx"></script>
</body>
</html>
